name: Build Antigravity Package

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        system: [x86_64-linux]
      fail-fast: false

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Install Cachix
        uses: cachix/cachix-action@v17
        if: github.event_name != 'pull_request'
        with:
          name: antigravity-nix
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
          skipPush: true
        continue-on-error: true

      - name: Build default package
        run: nix build .#default --print-build-logs --system ${{ matrix.system }}

      - name: Build google-antigravity package
        run: nix build .#google-antigravity --print-build-logs --system ${{ matrix.system }}

      - name: Build google-antigravity-no-fhs package
        run: nix build .#google-antigravity-no-fhs --print-build-logs --system ${{ matrix.system }}

      - name: Run flake check
        run: nix flake check --print-build-logs --system ${{ matrix.system }}
